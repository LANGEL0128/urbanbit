<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00AEEF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00AEEF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00AEEF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00AEEF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00AEEF"/>
      <stop offset="100%" stop-color="#00AEEF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1117"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <ellipse cx="1080" cy="160" rx="420" ry="320" fill="url(#orb1)"/>
  <ellipse cx="120"  cy="520" rx="280" ry="200" fill="url(#orb2)"/>

  <!-- Logo icon -->
  <rect x="80" y="76" width="46" height="46" rx="11" fill="#00AEEF"/>
  <rect x="138" y="76" width="46" height="46" rx="11" fill="rgba(0,174,239,0.52)"/>
  <rect x="109" y="134" width="46" height="46" rx="11" fill="rgba(0,174,239,0.72)"/>

  <!-- Brand name -->
  <text x="80" y="310" font-family="Arial Black, Arial, sans-serif" font-size="100" font-weight="900" fill="#FFFFFF" letter-spacing="-3">urban</text>
  <text x="500" y="310" font-family="Arial Black, Arial, sans-serif" font-size="100" font-weight="900" fill="#00AEEF" letter-spacing="-3">bit</text>

  <!-- Tagline -->
  <text x="80" y="368" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.50)" letter-spacing="0.5">Web Design &amp; IT Solutions — Montevideo, Uruguay</text>

  <!-- Divider line -->
  <rect x="80" y="408" width="520" height="2" fill="url(#lineGrad)"/>

  <!-- Service pills -->
  <rect x="80"  y="432" width="180" height="38" rx="19" fill="rgba(0,174,239,0.12)" stroke="rgba(0,174,239,0.35)" stroke-width="1"/>
  <text x="170" y="457" font-family="Arial, sans-serif" font-size="16" fill="#00AEEF" text-anchor="middle">Diseño Web</text>

  <rect x="276" y="432" width="196" height="38" rx="19" fill="rgba(0,174,239,0.12)" stroke="rgba(0,174,239,0.35)" stroke-width="1"/>
  <text x="374" y="457" font-family="Arial, sans-serif" font-size="16" fill="#00AEEF" text-anchor="middle">Apps Móviles</text>

  <rect x="488" y="432" width="210" height="38" rx="19" fill="rgba(0,174,239,0.12)" stroke="rgba(0,174,239,0.35)" stroke-width="1"/>
  <text x="593" y="457" font-family="Arial, sans-serif" font-size="16" fill="#00AEEF" text-anchor="middle">Marketing Digital</text>

  <!-- URL bottom -->
  <text x="80" y="572" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.28)">www.urbanbit.net</text>

  <!-- Stats right side -->
  <rect x="850" y="360" width="1" height="180" fill="rgba(255,255,255,0.08)"/>

  <text x="970"  y="450" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#00AEEF" text-anchor="middle">15+</text>
  <text x="970"  y="482" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)" text-anchor="middle">años de experiencia</text>

  <text x="1130" y="450" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#00AEEF" text-anchor="middle">1K+</text>
  <text x="1130" y="482" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)" text-anchor="middle">proyectos</text>

  <text x="970"  y="550" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#00AEEF" text-anchor="middle">500+</text>
  <text x="970"  y="582" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)" text-anchor="middle">clientes</text>

  <text x="1130" y="550" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" fill="#00AEEF" text-anchor="middle">4.9★</text>
  <text x="1130" y="582" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)" text-anchor="middle">valoración</text>
</svg>
